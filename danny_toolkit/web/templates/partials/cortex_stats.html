<div class="knowledge-map">
    <div class="stat-grid" style="margin-bottom: 0.75rem;">
        <div class="stat-item">
            <div class="stat-value">{{ meta.total_nodes }}</div>
            <div class="stat-label">Nodes</div>
        </div>
        <div class="stat-item">
            <div class="stat-value">{{ meta.total_edges }}</div>
            <div class="stat-label">Edges</div>
        </div>
        <div class="stat-item">
            <div class="stat-value">{{ meta.cross_domain_edges }}</div>
            <div class="stat-label">Cross-Domain</div>
        </div>
        <div class="stat-item">
            <div class="stat-value">{{ meta.total_docs }}</div>
            <div class="stat-label">RAG Docs</div>
        </div>
    </div>
    <svg viewBox="0 0 560 320" style="width:100%;height:auto;background:#0d1117;border-radius:6px;">
        <!-- Edge lines (cross-domain only to reduce clutter with 430 edges) -->
        {% for e in edges %}
        {% if e.cross_domain %}
        <line x1="{{ positions[e.source][0] }}" y1="{{ positions[e.source][1] }}"
              x2="{{ positions[e.target][0] }}" y2="{{ positions[e.target][1] }}"
              stroke="#58a6ff15" stroke-width="0.5" />
        {% endif %}
        {% endfor %}
        <!-- Intra-domain edges (solid) -->
        {% for e in edges %}
        {% if not e.cross_domain %}
        <line x1="{{ positions[e.source][0] }}" y1="{{ positions[e.source][1] }}"
              x2="{{ positions[e.target][0] }}" y2="{{ positions[e.target][1] }}"
              stroke="#3b4252" stroke-width="1" />
        {% endif %}
        {% endfor %}
        <!-- Domain labels -->
        <text x="280" y="18" fill="#bc8cff" font-size="12" font-weight="700" text-anchor="middle">MIND ({{ nodes|selectattr('domain','equalto','MIND')|list|length }})</text>
        <text x="60" y="310" fill="#3fb950" font-size="12" font-weight="700" text-anchor="middle">BODY ({{ nodes|selectattr('domain','equalto','BODY')|list|length }})</text>
        <text x="500" y="310" fill="#58a6ff" font-size="12" font-weight="700" text-anchor="middle">SOUL ({{ nodes|selectattr('domain','equalto','SOUL')|list|length }})</text>
        <!-- Nodes -->
        {% for n in nodes %}
        <circle cx="{{ positions[n.id][0] }}" cy="{{ positions[n.id][1] }}"
                r="{{ [4 + n.docs // 2, 12]|min }}"
                fill="{{ '#bc8cff' if n.domain == 'MIND' else '#3fb950' if n.domain == 'BODY' else '#58a6ff' }}"
                opacity="0.85">
            <title>{{ n.id }} ({{ n.domain }}) — {{ n.docs }} docs</title>
        </circle>
        <text x="{{ positions[n.id][0] }}" y="{{ positions[n.id][1] + 14 + [n.docs // 2, 8]|min }}"
              fill="#8b949e" font-size="7" text-anchor="middle">{{ n.id }}</text>
        {% endfor %}
    </svg>
    <div style="margin-top:0.4rem;font-size:0.7rem;color:var(--text-secondary);">
        v{{ meta.get('version', '?') if meta.get is defined else '?' }} | {{ meta.total_docs }} docs | {{ meta.generated[:16] if meta.generated is defined else '-' }}
    </div>
</div>
