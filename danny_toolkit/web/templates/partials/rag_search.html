<div>
    <form hx-post="/ui/partials/rag-search"
          hx-target="#rag-results"
          hx-indicator="#rag-spinner"
          style="margin-bottom: 0.75rem;">
        <div style="display: flex; gap: 0.5rem; margin-bottom: 0.5rem;">
            <input type="text" name="query" placeholder="Zoek in RAG..."
                   autocomplete="off"
                   style="flex: 1; padding: 0.5rem 0.75rem; background: var(--bg-secondary);
                          border: 1px solid var(--border); border-radius: 4px;
                          color: var(--text-primary); font-size: 0.85rem; outline: none;">
            <select name="collection"
                    style="padding: 0.5rem; background: var(--bg-secondary);
                           border: 1px solid var(--border); border-radius: 4px;
                           color: var(--text-primary); font-size: 0.8rem;">
                {% for col in collections %}
                <option value="{{ col.name }}"{% if col.name == "danny_knowledge" %} selected{% endif %}>
                    {{ col.name }} ({{ col.count }})
                </option>
                {% endfor %}
            </select>
            <select name="top_k"
                    style="padding: 0.5rem; background: var(--bg-secondary);
                           border: 1px solid var(--border); border-radius: 4px;
                           color: var(--text-primary); font-size: 0.8rem; width: 60px;">
                <option value="5" selected>5</option>
                <option value="10">10</option>
                <option value="15">15</option>
                <option value="20">20</option>
            </select>
            <button type="submit"
                    style="padding: 0.5rem 1rem; background: var(--accent);
                           border: none; border-radius: 4px; color: #fff;
                           font-weight: 600; font-size: 0.8rem; cursor: pointer;">
                Zoek
            </button>
        </div>
    </form>
    <span id="rag-spinner" class="htmx-indicator" style="font-size: 0.75rem; color: var(--accent);">
        Zoeken in ChromaDB...
    </span>
    <div id="rag-results">
        <div class="stat-grid">
            <div class="stat-item">
                <div class="stat-value">{{ total_docs }}</div>
                <div class="stat-label">Documenten</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">{{ collections|length }}</div>
                <div class="stat-label">Collecties</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">{{ db_size_mb }}</div>
                <div class="stat-label">DB (MB)</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">ChromaDB</div>
                <div class="stat-label">Backend</div>
            </div>
        </div>
    </div>
</div>
